<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>默契画一画</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'PingFang SC', sans-serif; touch-action: none; }
        .game-board { width: 92vw; max-width: 420px; background-color: #fdfcf8; border: 3px solid #333; border-radius: 20px; padding: 15px; box-sizing: border-box; box-shadow: 4px 4px 0px #e0e0e0; position: relative;}
        .header { text-align: center; font-size: 22px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .status-text { text-align: center; font-size: 14px; color: #ff9800; margin-bottom: 15px; height: 20px; font-weight: bold;}
        
        .canvas-container { border: 2px dashed #ccc; border-radius: 10px; overflow: hidden; position: relative; height: 55vh; max-height: 450px; display: flex; flex-direction: column; background: #fff;}
        .half-area { flex: 1; position: relative; width: 100%; border-bottom: 2px dashed #ccc; }
        .half-area:last-child { border-bottom: none; }
        
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #eee; display: flex; justify-content: center; align-items: center; flex-direction: column; color: #999; z-index: 10; font-size: 16px;}
        .lock-icon { font-size: 24px; margin-bottom: 8px; }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        .toolbar { display: flex; flex-wrap: wrap; gap: 10px; justify-content: space-between; align-items: center; margin-top: 15px; padding: 12px; background-color: #fff; border: 2px solid #333; border-radius: 15px; }
        .control-group { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #555; font-weight: bold; }
        #colorPicker { -webkit-appearance: none; border: 2px solid #333; padding: 0; width: 35px; height: 35px; border-radius: 50%; overflow: hidden; cursor: pointer; }
        #colorPicker::-webkit-color-swatch-wrapper { padding: 0; } #colorPicker::-webkit-color-swatch { border: none; }
        .slider-container { flex-grow: 1; min-width: 120px; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; outline: none; border: 1px solid #ccc; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border: 3px solid #6ba863; border-radius: 50%; cursor: pointer; }
        .btn-clear { background-color: #e6e4df; border: 2px solid #ccc; padding: 8px 12px; border-radius: 10px; color: #555; font-weight: bold; cursor: pointer; }
        .submit-btn { width: 100%; padding: 15px; margin-top: 15px; background-color: #d8d8d8; color: #fff; border: none; border-radius: 25px; font-size: 18px; font-weight: bold; transition: all 0.3s; }
        .submit-btn.active { background-color: #6ba863; box-shadow: 0 4px 8px rgba(107, 168, 99, 0.3); }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .result-box { background-color: #fff; padding: 20px; border-radius: 15px; text-align: center; width: 85vw; max-width: 350px; }
        .result-title { font-size: 24px; font-weight: bold; margin-bottom: 15px; color: #333; }
        .result-canvas-container { border: 2px solid #333; border-radius: 10px; overflow: hidden; background-color: #fff; margin-bottom: 20px; height: 50vh;}
        #resultCanvas { width: 100%; height: 100%; display: block; }
        .next-btn { background-color: #ff9800; color: #fff; border: none; padding: 12px 30px; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; }
        #fullLockScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 50; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #333; border-radius: 15px;}
    </style>
</head>
<body>

<div class="game-board">
    <div id="fullLockScreen">等待服务器连接...</div>
    <div class="header" id="wordDisplay">- 等待对手 -</div>
    <div class="status-text" id="statusText">正在连接服务器...</div>
    
    <div class="canvas-container">
        <div class="half-area" id="topArea">
            <div class="lock-overlay" id="topLock">
                <div class="lock-icon">🔒</div>
                <div id="topLockText">等待分配...</div>
            </div>
            <canvas id="topCanvas"></canvas>
        </div>
        <div class="half-area" id="bottomArea">
            <div class="lock-overlay" id="bottomLock">
                <div class="lock-icon">🔒</div>
                <div id="bottomLockText">等待分配...</div>
            </div>
            <canvas id="bottomCanvas"></canvas>
        </div>
    </div>

    <div class="toolbar">
        <div class="control-group">
            <input type="color" id="colorPicker" value="#6ba863">
        </div>
        <div class="control-group slider-container">
            <input type="range" id="lineWidthSlider" min="1" max="20" value="5">
        </div>
        <button class="btn-clear" id="clearBtn">清空</button>
    </div>
    <button class="submit-btn" id="submitBtn">提交我的部分</button>
</div>

<div class="overlay" id="settlementScreen">
    <div class="result-box">
        <div class="result-title">✨ 你们的杰作 ✨</div>
        <div class="result-canvas-container">
            <canvas id="resultCanvas"></canvas>
        </div>
        <button class="next-btn" id="nextBtn">再来一局</button>
    </div>
</div>

<script>
    const socket = io(); 
    
    const wordDisplay = document.getElementById('wordDisplay');
    const statusText = document.getElementById('statusText');
    const fullLockScreen = document.getElementById('fullLockScreen');
    const settlementScreen = document.getElementById('settlementScreen');
    const submitBtn = document.getElementById('submitBtn');
    
    const topCanvas = document.getElementById('topCanvas');
    const bottomCanvas = document.getElementById('bottomCanvas');
    let myRole = null;       
    let activeCanvas = null; 
    let ctx = null;          

    let isDrawing = false; 
    let hasDrawn = false;
    let currentColor = '#6ba863';
    let currentLineWidth = 5;

    socket.on('assign_role', (role) => {
        myRole = role;
        
        topCanvas.width = topCanvas.parentElement.clientWidth;
        topCanvas.height = topCanvas.parentElement.clientHeight;
        bottomCanvas.width = bottomCanvas.parentElement.clientWidth;
        bottomCanvas.height = bottomCanvas.parentElement.clientHeight;

        if (role === 'top') {
            activeCanvas = topCanvas;
            document.getElementById('topLock').style.display = 'none';
            document.getElementById('bottomLockText').textContent = '等待对方加入...';
        } else {
            activeCanvas = bottomCanvas;
            document.getElementById('bottomLock').style.display = 'none';
            document.getElementById('topLockText').textContent = '房主的区域';
        }
        
        ctx = activeCanvas.getContext('2d');
        ctx.lineCap = 'round'; 
        ctx.lineJoin = 'round';
        bindDrawingEvents(); 
    });

    socket.on('system_msg', (msg) => { statusText.textContent = msg; });

    socket.on('game_start', (word) => {
        wordDisplay.textContent = `- ${word} -`;
        statusText.textContent = "游戏开始！请在你的区域作画";
        fullLockScreen.style.display = 'none';
        hasDrawn = false;
        submitBtn.classList.remove('active');
        
        if (myRole === 'top') {
            document.getElementById('bottomLockText').textContent = '对方作画中...';
        } else {
            document.getElementById('topLockText').textContent = '对方作画中...';
        }
    });

    socket.on('game_over', (drawings) => {
        showSettlement(drawings.top, drawings.bottom);
    });

    socket.on('reset_game', () => { window.location.reload(); });
    
    document.getElementById('colorPicker').addEventListener('input', (e) => currentColor = e.target.value);
    document.getElementById('lineWidthSlider').addEventListener('input', (e) => currentLineWidth = e.target.value);

    function getPos(e) {
        const rect = activeCanvas.getBoundingClientRect(); 
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { 
            x: (clientX - rect.left) * (activeCanvas.width / rect.width), 
            y: (clientY - rect.top) * (activeCanvas.height / rect.height) 
        };
    }

    function startDrawing(e) {
        if (e.cancelable) e.preventDefault();
        isDrawing = true; hasDrawn = true;
        const pos = getPos(e);
        ctx.beginPath(); ctx.strokeStyle = currentColor; ctx.lineWidth = currentLineWidth;
        ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
        submitBtn.classList.add('active');
    }
    function draw(e) { if (!isDrawing) return; if (e.cancelable) e.preventDefault(); const pos = getPos(e); ctx.lineTo(pos.x, pos.y); ctx.stroke(); }
    function stopDrawing(e) { if (isDrawing) { if (e.cancelable) e.preventDefault(); isDrawing = false; ctx.closePath(); } }

    function bindDrawingEvents() {
        activeCanvas.addEventListener('mousedown', startDrawing);
        activeCanvas.addEventListener('mousemove', draw);
        activeCanvas.addEventListener('mouseup', stopDrawing);
        activeCanvas.addEventListener('mouseout', stopDrawing);
        activeCanvas.addEventListener('touchstart', startDrawing, {passive: false});
        activeCanvas.addEventListener('touchmove', draw, {passive: false});
        activeCanvas.addEventListener('touchend', stopDrawing, {passive: false});
    }

    document.getElementById('clearBtn').addEventListener('click', () => {
        if(ctx) ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
        submitBtn.classList.remove('active'); hasDrawn = false;
    });

    submitBtn.addEventListener('click', () => {
        if (!hasDrawn) return alert("请先画点什么吧！");
        fullLockScreen.style.display = 'flex'; 
        fullLockScreen.textContent = '已提交！等待对方完成...';
        socket.emit('submit_drawing', activeCanvas.toDataURL('image/png'));
    });

    function showSettlement(topBase64, bottomBase64) {
        const resCanvas = document.getElementById('resultCanvas');
        const resCtx = resCanvas.getContext('2d');
        resCanvas.width = topCanvas.width;
        resCanvas.height = topCanvas.height + bottomCanvas.height; 

        const imgTop = new Image(); const imgBottom = new Image();
        let loaded = 0;
        function drawResult() {
            loaded++;
            if (loaded === 2) {
                resCtx.fillStyle = '#ffffff';
                resCtx.fillRect(0, 0, resCanvas.width, resCanvas.height);
                resCtx.drawImage(imgTop, 0, 0, resCanvas.width, topCanvas.height);
                resCtx.drawImage(imgBottom, 0, topCanvas.height, resCanvas.width, bottomCanvas.height);
                
                resCtx.beginPath(); resCtx.setLineDash([5, 5]);
                resCtx.moveTo(0, topCanvas.height); resCtx.lineTo(resCanvas.width, topCanvas.height);
                resCtx.strokeStyle = '#999'; resCtx.lineWidth = 2; resCtx.stroke();
                
                settlementScreen.style.display = 'flex';
            }
        }
        imgTop.onload = drawResult; imgBottom.onload = drawResult;
        imgTop.src = topBase64; imgBottom.src = bottomBase64;
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        window.location.reload(); 
    });
</script>
</body>
</html>
