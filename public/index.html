<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>默契画一画</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #f5f5f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'PingFang SC', sans-serif; touch-action: none; }
        .game-board { width: 92vw; max-width: 420px; background-color: #fdfcf8; border: 3px solid #333; border-radius: 20px; padding: 15px; box-sizing: border-box; box-shadow: 4px 4px 0px #e0e0e0; position: relative; display: none; /* 默认隐藏，等进了房间再显示 */}
        
        /* --- 大厅/登录页样式 --- */
        .lobby-screen { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: #fdfcf8; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 200; overflow-y: auto;}
        .lobby-box { width: 90vw; max-width: 380px; text-align: center; }
        .lobby-title { font-size: 32px; font-weight: 900; color: #333; margin-bottom: 30px; letter-spacing: 2px; text-shadow: 2px 2px 0px #8bc34a;}
        
        .profile-section { background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #333; margin-bottom: 20px; box-shadow: 3px 3px 0px #ccc; }
        .username-input { width: 80%; padding: 10px; font-size: 16px; border: 2px solid #ccc; border-radius: 8px; margin-bottom: 15px; text-align: center; outline: none; font-weight: bold;}
        .username-input:focus { border-color: #8bc34a; }
        .avatar-picker { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
        .avatar-btn { font-size: 30px; cursor: pointer; padding: 5px; border-radius: 50%; border: 2px solid transparent; transition: all 0.2s; background: #f5f5f5; width: 45px; height: 45px; display: flex; justify-content: center; align-items: center;}
        .avatar-btn.selected { border-color: #8bc34a; background: #e8f5e9; transform: scale(1.1); }
        
        .create-btn { width: 100%; padding: 15px; background-color: #ff9800; color: #fff; border: 2px solid #333; border-radius: 25px; font-size: 18px; font-weight: bold; cursor: pointer; transition: transform 0.1s; box-shadow: 0 4px 0 #e65100;}
        .create-btn:active { transform: translateY(4px); box-shadow: none; }
        
        .room-list-section { background: #fff; padding: 20px; border-radius: 15px; border: 2px solid #333; box-shadow: 3px 3px 0px #ccc; text-align: left;}
        .room-list-title { font-size: 18px; font-weight: bold; color: #555; margin-bottom: 10px; display: flex; justify-content: space-between;}
        .room-item { padding: 12px; background: #f9f9f9; border: 2px solid #ddd; border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .room-info { display: flex; flex-direction: column; }
        .room-owner { font-weight: bold; font-size: 16px; color: #333;}
        .room-count { font-size: 12px; color: #888; }
        .join-btn { padding: 8px 15px; background: #8bc34a; color: white; border: none; border-radius: 15px; font-weight: bold; cursor: pointer; }
        .join-btn:disabled { background: #ccc; cursor: not-allowed; }

        /* --- 游戏主界面样式 --- */
        .header { text-align: center; font-size: 20px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .round-display { color: #8bc34a; font-weight: 900; margin-right: 5px; }
        .status-text { text-align: center; font-size: 14px; color: #ff9800; margin-bottom: 10px; height: 20px; font-weight: bold; transition: color 0.3s;}
        
        .canvas-container { border: 2px dashed #ccc; border-radius: 10px; overflow: hidden; position: relative; height: 50vh; max-height: 400px; display: flex; flex-direction: column; background: #fff;}
        .half-area { flex: 1; position: relative; width: 100%; border-bottom: 2px dashed #ccc; }
        .half-area:last-child { border-bottom: none; }
        .lock-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: #eee; display: flex; justify-content: center; align-items: center; flex-direction: column; color: #999; z-index: 10; font-size: 16px;}
        .partner-profile { display: flex; flex-direction: column; align-items: center; margin-bottom: 10px; }
        .partner-avatar { font-size: 40px; margin-bottom: 5px; }
        .partner-name { font-weight: bold; color: #555; }
        
        canvas { display: block; width: 100%; height: 100%; }
        
        .toolbar { margin-top: 15px; padding: 10px; background-color: #fff; border: 2px solid #333; border-radius: 15px; display: flex; flex-direction: column; gap: 10px; }
        .color-palette { display: grid; grid-template-columns: repeat(8, 1fr); gap: 6px; justify-items: center; }
        .color-btn { width: 24px; height: 24px; border-radius: 50%; border: 2px solid #ddd; cursor: pointer; box-sizing: border-box; transition: transform 0.1s; }
        .color-btn.active { border-color: #333; transform: scale(1.2); box-shadow: 0 2px 5px rgba(0,0,0,0.3); }
        
        .bottom-tools { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
        .slider-container { flex-grow: 1; display: flex; align-items: center; gap: 5px; font-size: 14px; font-weight: bold; color: #555; }
        input[type=range] { -webkit-appearance: none; width: 100%; height: 8px; background: #e0e0e0; border-radius: 4px; outline: none; border: 1px solid #ccc; }
        input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 20px; height: 20px; background: #fff; border: 3px solid #333; border-radius: 50%; cursor: pointer; }
        .btn-tool { background-color: #e6e4df; border: 2px solid #ccc; padding: 6px 10px; border-radius: 10px; color: #555; font-weight: bold; cursor: pointer; font-size: 13px;}
        
        .submit-btn { width: 100%; padding: 12px; margin-top: 15px; background-color: #d8d8d8; color: #fff; border: none; border-radius: 25px; font-size: 18px; font-weight: bold; transition: all 0.3s; }
        .submit-btn.active { background-color: #6ba863; box-shadow: 0 4px 8px rgba(107, 168, 99, 0.3); }
        #fullLockScreen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.7); z-index: 50; display: flex; justify-content: center; align-items: center; font-weight: bold; color: #333; border-radius: 15px; text-align: center; padding: 20px;}
        
        .overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background-color: rgba(0, 0, 0, 0.85); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 100; }
        .result-box { background-color: #fff; padding: 20px; border-radius: 15px; text-align: center; width: 90vw; max-width: 400px; max-height: 90vh; overflow-y: auto;}
        .result-title { font-size: 24px; font-weight: bold; margin-bottom: 5px; color: #333; }
        .result-word { font-size: 20px; color: #ff9800; font-weight: bold; margin-bottom: 5px; letter-spacing: 2px; }
        .partner-notify { font-size: 14px; color: #f44336; height: 20px; font-weight: bold; margin-bottom: 10px; }
        .result-canvas-container { border: 2px solid #333; border-radius: 10px; overflow: hidden; background-color: #fff; margin-bottom: 20px; height: 45vh; min-height: 250px;}
        #resultCanvas { width: 100%; height: 100%; display: block; }
        .btn-group { display: flex; gap: 10px; justify-content: space-between; width: 100%; }
        .action-btn { flex: 1; padding: 12px 0; border: none; border-radius: 25px; font-size: 16px; font-weight: bold; cursor: pointer; transition: all 0.3s; color: #fff;}
        .btn-continue { background-color: #8bc34a; }
        .btn-continue:disabled { background-color: #ccc; cursor: not-allowed; }
        .btn-exit { background-color: #f44336; }

        .gallery-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; text-align: center; }
        .gallery-item { border: 2px solid #333; border-radius: 8px; overflow: hidden; background: #fff; }
        .gallery-title { font-weight: bold; padding: 5px 0; border-bottom: 2px solid #333; background: #fdfcf8; font-size: 14px;}
        .gallery-img-container { display: flex; flex-direction: column; }
        .gallery-img-container img { width: 100%; display: block; }
    </style>
</head>
<body>

<div class="lobby-screen" id="lobbyScreen">
    <div class="lobby-box">
        <div class="lobby-title">🎨 默契画一画</div>
        
        <div class="profile-section">
            <input type="text" id="usernameInput" class="username-input" placeholder="输入你的昵称" maxlength="8">
            <div style="font-size: 14px; color: #666; margin-bottom: 5px; font-weight: bold;">选择一个代表你的头像：</div>
            <div class="avatar-picker" id="avatarPicker">
                </div>
            <button class="create-btn" id="createRoomBtn">自己建个房间</button>
        </div>

        <div class="room-list-section">
            <div class="room-list-title">
                <span>现有房间列表</span>
                <span id="roomCountText" style="color: #8bc34a; font-size: 14px;">0/3</span>
            </div>
            <div id="roomList">
                <div style="text-align: center; color: #999; padding: 10px; font-size: 14px;">暂无空闲房间，快去建一个吧！</div>
            </div>
        </div>
    </div>
</div>

<div class="game-board" id="gameBoard">
    <div id="fullLockScreen">等待房主的好友加入...</div>
    <div class="header">
        <span class="round-display" id="roundDisplay"></span>
        <span id="wordDisplay">- 等待对手 -</span>
    </div>
    <div class="status-text" id="statusText">正在连接服务器...</div>
    
    <div class="canvas-container">
        <div class="half-area" id="topArea">
            <div class="lock-overlay" id="topLock">
                <div class="partner-profile">
                    <div class="partner-avatar" id="topAvatar">🔒</div>
                    <div class="partner-name" id="topName">等待分配...</div>
                </div>
            </div>
            <canvas id="topCanvas"></canvas>
        </div>
        <div class="half-area" id="bottomArea">
            <div class="lock-overlay" id="bottomLock">
                <div class="partner-profile">
                    <div class="partner-avatar" id="bottomAvatar">🔒</div>
                    <div class="partner-name" id="bottomName">等待分配...</div>
                </div>
            </div>
            <canvas id="bottomCanvas"></canvas>
        </div>
    </div>

    <div class="toolbar">
        <div class="color-palette" id="colorPalette"></div>
        <div class="bottom-tools">
            <div class="slider-container">
                粗细 <input type="range" id="lineWidthSlider" min="1" max="20" value="5">
            </div>
            <div style="display: flex; gap: 5px;">
                <button class="btn-tool" id="undoBtn">撤销</button>
                <button class="btn-tool" id="clearBtn">清空</button>
            </div>
        </div>
    </div>
    <button class="submit-btn" id="submitBtn">提交我的画作</button>
</div>

<div class="overlay" id="settlementScreen">
    <div class="result-box">
        <div class="result-title">✨ 本轮杰作 ✨</div>
        <div class="result-word" id="resultWordDisplay">题目</div>
        <div class="partner-notify" id="settleNotify"></div>
        <div class="result-canvas-container"><canvas id="resultCanvas"></canvas></div>
        <div class="btn-group">
            <button class="action-btn btn-continue" id="continueBtn">继续下一轮</button>
            <button class="action-btn btn-exit" onclick="backToLobby()">返回大厅</button>
        </div>
    </div>
</div>

<div class="overlay" id="galleryScreen">
    <div class="result-box" style="width: 95vw; max-width: 500px;">
        <div class="result-title">🏆 默契画一画 - 最终画展 🏆</div>
        <div class="partner-notify" id="galleryNotify" style="margin-top: 5px;"></div>
        <div class="gallery-grid" id="galleryGrid"></div>
        <div class="btn-group">
            <button class="action-btn btn-continue" id="galleryRestartBtn">再来一局</button>
            <button class="action-btn btn-exit" onclick="backToLobby()">返回大厅</button>
        </div>
    </div>
</div>

<script>
    const socket = io(); 
    
    // --- 大厅逻辑 ---
    const lobbyScreen = document.getElementById('lobbyScreen');
    const gameBoard = document.getElementById('gameBoard');
    const usernameInput = document.getElementById('usernameInput');
    const avatarPicker = document.getElementById('avatarPicker');
    
    const avatars = ['🐶', '🐱', '🐰', '🦊', '🐻', '🐼', '🐸', '🐷'];
    let myAvatar = '🐶'; // 默认头像

    // 生成头像选择器
    avatars.forEach(emoji => {
        let btn = document.createElement('div');
        btn.className = 'avatar-btn';
        btn.textContent = emoji;
        if(emoji === myAvatar) btn.classList.add('selected');
        btn.onclick = () => {
            document.querySelectorAll('.avatar-btn').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            myAvatar = emoji;
        };
        avatarPicker.appendChild(btn);
    });

    // 获取个人资料
    function getProfile() {
        let name = usernameInput.value.trim();
        if (!name) name = "神秘画家" + Math.floor(Math.random() * 100);
        return { name, avatar: myAvatar };
    }

    // 建房
    document.getElementById('createRoomBtn').addEventListener('click', () => {
        socket.emit('create_room', getProfile());
    });

    // 加入房间
    function joinRoom(roomId) {
        socket.emit('join_room', { roomId, userProfile: getProfile() });
    }

    // 更新房间列表
    socket.on('room_list_update', (rooms) => {
        const roomList = document.getElementById('roomList');
        document.getElementById('roomCountText').textContent = `${rooms.length}/3`;
        
        if (rooms.length === 0) {
            roomList.innerHTML = '<div style="text-align: center; color: #999; padding: 10px; font-size: 14px;">暂无空闲房间，快去建一个吧！</div>';
            return;
        }

        roomList.innerHTML = '';
        rooms.forEach(room => {
            const isFull = room.playerCount >= 2;
            const btnHtml = isFull 
                ? `<button class="join-btn" disabled>已满</button>`
                : `<button class="join-btn" onclick="joinRoom('${room.id}')">加入</button>`;
            
            roomList.innerHTML += `
                <div class="room-item">
                    <div class="room-info">
                        <span class="room-owner">${room.ownerName} 的房间</span>
                        <span class="room-count">玩家: ${room.playerCount}/2</span>
                    </div>
                    ${btnHtml}
                </div>
            `;
        });
    });

    // 成功进入房间
    socket.on('room_joined', (data) => {
        lobbyScreen.style.display = 'none';
        gameBoard.style.display = 'block';
        resizeCanvas();
        fullLockScreen.style.display = 'flex';
        fullLockScreen.textContent = data.isOwner ? '房间创建成功！等待好友加入...' : '加入成功！等待游戏开始...';
    });

    // 房间解散或对方退出
    socket.on('room_closed', (msg) => {
        alert(msg);
        backToLobby();
    });

    // 收到系统通知（房间满了等）
    socket.on('system_msg', (msg) => {
        if(lobbyScreen.style.display !== 'none') {
            alert(msg); // 在大厅就弹窗
        } else {
            statusText.textContent = msg; // 在游戏里就更新文字
        }
    });

    // 返回大厅刷新页面
    function backToLobby() {
        window.location.reload();
    }


    // --- 游戏内部逻辑 ---
    const roundDisplay = document.getElementById('roundDisplay');
    const wordDisplay = document.getElementById('wordDisplay');
    const statusText = document.getElementById('statusText');
    const fullLockScreen = document.getElementById('fullLockScreen');
    const submitBtn = document.getElementById('submitBtn');
    
    const settlementScreen = document.getElementById('settlementScreen');
    const resultWordDisplay = document.getElementById('resultWordDisplay');
    const settleNotify = document.getElementById('settleNotify');
    const continueBtn = document.getElementById('continueBtn');
    
    const galleryScreen = document.getElementById('galleryScreen');
    const galleryGrid = document.getElementById('galleryGrid');
    const galleryNotify = document.getElementById('galleryNotify');
    const galleryRestartBtn = document.getElementById('galleryRestartBtn');
    
    const topCanvas = document.getElementById('topCanvas');
    const bottomCanvas = document.getElementById('bottomCanvas');
    let myRole = null;       
    let activeCanvas = null; 
    let ctx = null;          

    let paths = []; 
    let currentPath = null; 
    let isDrawing = false; 
    let hasDrawn = false;
    let currentColor = '#000000'; 
    let currentLineWidth = 5;
    let currentWord = "";

    const colors = [
        '#000000', '#555555', '#aaaaaa', '#ffffff', 
        '#ed1c24', '#ff7f27', '#fff200', '#b5e61d', 
        '#22b14c', '#00a2e8', '#3f48cc', '#a349a4', 
        '#ffa3b1', '#b97a57', '#ffc90e', '#00ffff'
    ];
    
    const palette = document.getElementById('colorPalette');
    colors.forEach(c => {
        let btn = document.createElement('div');
        btn.className = 'color-btn';
        btn.style.backgroundColor = c;
        if(c === currentColor) btn.classList.add('active');
        btn.onclick = () => {
            document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            currentColor = c;
        };
        palette.appendChild(btn);
    });

    function resizeCanvas() {
        if(topCanvas.parentElement.clientWidth === 0) return; 
        topCanvas.width = topCanvas.parentElement.clientWidth; topCanvas.height = topCanvas.parentElement.clientHeight;
        bottomCanvas.width = bottomCanvas.parentElement.clientWidth; bottomCanvas.height = bottomCanvas.parentElement.clientHeight;
        if(ctx) { ctx.lineCap = 'round'; ctx.lineJoin = 'round'; redrawAll(); }
    }
    window.addEventListener('resize', resizeCanvas);

    // 【修改】游戏开始时，在锁定的画布上显示对方的头像和名字
    socket.on('game_start', (data) => {
        myRole = data.role;
        currentWord = data.word; 
        roundDisplay.textContent = `[${data.round}/${data.total}]`;
        wordDisplay.textContent = `- ${data.word} -`;
        statusText.textContent = "游戏开始！请在你的区域作画";
        statusText.style.color = '#ff9800';
        
        fullLockScreen.style.display = 'none';
        settlementScreen.style.display = 'none'; 
        galleryScreen.style.display = 'none';
        
        document.getElementById('topLock').style.display = myRole === 'top' ? 'none' : 'flex';
        document.getElementById('bottomLock').style.display = myRole === 'bottom' ? 'none' : 'flex';
        
        // 把资料写到对应的锁定区域上
        if (myRole === 'bottom') {
            document.getElementById('topAvatar').textContent = data.partnerAvatar;
            document.getElementById('topName').textContent = data.partnerName + ' 作画中...';
        } else {
            document.getElementById('bottomAvatar').textContent = data.partnerAvatar;
            document.getElementById('bottomName').textContent = data.partnerName + ' 作画中...';
        }

        activeCanvas = myRole === 'top' ? topCanvas : bottomCanvas;
        resizeCanvas();
        ctx = activeCanvas.getContext('2d');
        ctx.lineCap = 'round'; ctx.lineJoin = 'round';

        paths = [];
        hasDrawn = false;
        submitBtn.classList.remove('active');
        if(ctx) ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
        
        continueBtn.disabled = false; continueBtn.textContent = '继续下一轮'; continueBtn.style.backgroundColor = '#8bc34a';
        galleryRestartBtn.disabled = false; galleryRestartBtn.textContent = '再来一局 (全新6词)'; galleryRestartBtn.style.backgroundColor = '#8bc34a';
        settleNotify.textContent = ''; galleryNotify.textContent = '';
    });

    socket.on('partner_submitted', () => {
        if (!submitBtn.classList.contains('active') || fullLockScreen.style.display === 'none') {
            statusText.textContent = "👉 对方已交卷，赶紧画，等你咯！"; statusText.style.color = "#f44336";
        }
    });

    socket.on('partner_continued', () => {
        if (galleryScreen.style.display !== 'flex') { settleNotify.textContent = "👉 对方已准备好，就等你了！"; }
        galleryNotify.textContent = "👉 对方想再来一局，等你确认！";
    });

    socket.on('game_over', (drawings) => { showSettlement(drawings.top, drawings.bottom); });

    socket.on('show_gallery', (galleryData) => {
        settlementScreen.style.display = 'none'; 
        galleryScreen.style.display = 'flex';
        galleryNotify.textContent = '';
        galleryRestartBtn.disabled = false; galleryRestartBtn.textContent = '再来一局 (全新6词)'; galleryRestartBtn.style.backgroundColor = '#8bc34a';
        
        galleryGrid.innerHTML = '';
        galleryData.forEach((item, index) => {
            galleryGrid.innerHTML += `
                <div class="gallery-item">
                    <div class="gallery-title">${index + 1}. ${item.word}</div>
                    <div class="gallery-img-container"><img src="${item.top}"><img src="${item.bottom}" style="border-top: 2px dashed #ccc;"></div>
                </div>`;
        });
    });

    function sendContinue(btnEl) {
        btnEl.disabled = true; btnEl.textContent = '等待对方...'; btnEl.style.backgroundColor = '#ccc';
        socket.emit('request_continue'); 
    }
    continueBtn.addEventListener('click', () => sendContinue(continueBtn));
    galleryRestartBtn.addEventListener('click', () => sendContinue(galleryRestartBtn));
    
    // --- 绘画逻辑 ---
    document.getElementById('lineWidthSlider').addEventListener('input', (e) => currentLineWidth = e.target.value);

    function getPos(e) {
        const rect = activeCanvas.getBoundingClientRect(); 
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * (activeCanvas.width / rect.width), y: (clientY - rect.top) * (activeCanvas.height / rect.height) };
    }

    function startDrawing(e) {
        if (e.target !== activeCanvas) return; 
        if (e.cancelable) e.preventDefault();
        isDrawing = true; 
        const pos = getPos(e);
        currentPath = { color: currentColor, width: currentLineWidth, points: [pos] };
        ctx.beginPath(); ctx.strokeStyle = currentColor; ctx.lineWidth = currentLineWidth;
        ctx.moveTo(pos.x, pos.y); ctx.lineTo(pos.x, pos.y); ctx.stroke();
    }
    
    function draw(e) { 
        if (!isDrawing) return; 
        if (e.cancelable) e.preventDefault(); 
        const pos = getPos(e); 
        currentPath.points.push(pos); 
        ctx.lineTo(pos.x, pos.y); ctx.stroke(); 
    }
    
    function stopDrawing(e) { 
        if (isDrawing) { 
            if (e.cancelable) e.preventDefault(); 
            isDrawing = false; ctx.closePath(); paths.push(currentPath); checkStatus();
        } 
    }

    [topCanvas, bottomCanvas].forEach(cvs => {
        cvs.addEventListener('mousedown', startDrawing); cvs.addEventListener('mousemove', draw);
        cvs.addEventListener('mouseup', stopDrawing); cvs.addEventListener('mouseout', stopDrawing);
        cvs.addEventListener('touchstart', startDrawing, {passive: false}); cvs.addEventListener('touchmove', draw, {passive: false});
        cvs.addEventListener('touchend', stopDrawing, {passive: false});
    });

    function redrawAll() {
        ctx.clearRect(0, 0, activeCanvas.width, activeCanvas.height);
        paths.forEach(path => {
            ctx.beginPath(); ctx.strokeStyle = path.color; ctx.lineWidth = path.width;
            if (path.points.length > 0) {
                ctx.moveTo(path.points[0].x, path.points[0].y);
                path.points.forEach(p => ctx.lineTo(p.x, p.y));
            }
            ctx.stroke();
        });
        checkStatus();
    }

    function checkStatus() {
        hasDrawn = paths.length > 0;
        if (hasDrawn) submitBtn.classList.add('active'); else submitBtn.classList.remove('active');
    }

    document.getElementById('undoBtn').addEventListener('click', () => { if (paths.length > 0) { paths.pop(); redrawAll(); } });
    document.getElementById('clearBtn').addEventListener('click', () => { paths = []; redrawAll(); });

    submitBtn.addEventListener('click', () => {
        if (!hasDrawn) return alert("请先画点什么吧！");
        fullLockScreen.style.display = 'flex'; 
        fullLockScreen.textContent = '已提交！等待对方完成...';
        socket.emit('submit_drawing', activeCanvas.toDataURL('image/png'));
    });

    function showSettlement(topBase64, bottomBase64) {
        resultWordDisplay.textContent = `[ ${currentWord} ]`;
        const resCanvas = document.getElementById('resultCanvas');
        const resCtx = resCanvas.getContext('2d');
        resCanvas.width = topCanvas.width; resCanvas.height = topCanvas.height + bottomCanvas.height; 

        const imgTop = new Image(); const imgBottom = new Image();
        let loaded = 0;
        function drawResult() {
            loaded++;
            if (loaded === 2) {
                resCtx.fillStyle = '#ffffff'; resCtx.fillRect(0, 0, resCanvas.width, resCanvas.height);
                resCtx.drawImage(imgTop, 0, 0, resCanvas.width, topCanvas.height);
                resCtx.drawImage(imgBottom, 0, topCanvas.height, resCanvas.width, bottomCanvas.height);
                resCtx.beginPath(); resCtx.setLineDash([5, 5]); resCtx.moveTo(0, topCanvas.height); resCtx.lineTo(resCanvas.width, topCanvas.height);
                resCtx.strokeStyle = '#999'; resCtx.lineWidth = 2; resCtx.stroke();
                settlementScreen.style.display = 'flex';
            }
        }
        imgTop.onload = drawResult; imgBottom.onload = drawResult;
        imgTop.src = topBase64; imgBottom.src = bottomBase64;
    }
</script>
</body>
</html>
